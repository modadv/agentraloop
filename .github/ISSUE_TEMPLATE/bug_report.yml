name: Bug report
description: Report a reproducible bug in AgentraLoop
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for someone else to reproduce the problem.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect instead?
      placeholder: A concise description of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Submit ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, relevant provider setup, and any local tooling details.
      placeholder: |
        OS:
        Node.js:
        npm:
        Provider:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs, stack traces, screenshots, or API responses.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra details, workarounds, or suspected root cause.
